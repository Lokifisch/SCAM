# ============================================================================
#  SCAM  -  Scale Character Attribute Mod
# ============================================================================

update-checker:
  # Check https://github.com/Lokifisch/SCAM/releases for a newer version.
  enabled: true

  # When a newer release with a .jar asset is found, download it into Bukkit's
  # update folder (plugins/update/) so it replaces the running jar automatically
  # the next time the server restarts. If false, only a console/op notice is shown.
  auto-update: true

  # How often to re-check for updates, in ticks (20 ticks = 1 second).
  # A check also always runs once on startup. 0 disables periodic re-checks.
  check-interval-ticks: 432000
